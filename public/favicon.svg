<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Aditya Rathod">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080e1a"/>
      <stop offset="1" stop-color="#03070f"/>
    </linearGradient>
    <linearGradient id="grad" x1="12" y1="12" x2="52" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67e8f9"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Outer circuit ring — represents infrastructure/systems -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="rgba(34,211,238,0.12)" stroke-width="1"/>

  <!-- Three connection nodes on the ring — represents endpoints/nodes -->
  <circle cx="32" cy="10" r="2" fill="#22d3ee" opacity="0.6"/>
  <circle cx="51" cy="42.5" r="2" fill="#818cf8" opacity="0.6"/>
  <circle cx="13" cy="42.5" r="2" fill="#67e8f9" opacity="0.6"/>

  <!-- Connection lines from nodes to center — represents retrieval/routing -->
  <line x1="32" y1="12" x2="32" y2="26" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
  <line x1="49.3" y1="41.5" x2="38" y2="35" stroke="rgba(129,140,248,0.2)" stroke-width="1"/>
  <line x1="14.7" y1="41.5" x2="26" y2="35" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>

  <!-- Terminal cursor — the center piece, represents coding/building -->
  <rect x="29.5" y="22" width="5" height="20" rx="2.5" fill="url(#grad)" filter="url(#glow)"/>

  <!-- Blink dot inside cursor -->
  <circle cx="32" cy="32" r="1.5" fill="#ffffff" opacity="0.9"/>
</svg>
