<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Aditya Rathod">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1c1616"/>
      <stop offset="1" stop-color="#0e0b0b"/>
    </linearGradient>
    <linearGradient id="grad" x1="12" y1="12" x2="52" y2="52" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e85d3a"/>
      <stop offset="0.5" stop-color="#c8402e"/>
      <stop offset="1" stop-color="#e8a848"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Outer circuit ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="rgba(200,64,46,0.15)" stroke-width="1"/>

  <!-- Three connection nodes -->
  <circle cx="32" cy="10" r="2" fill="#c8402e" opacity="0.6"/>
  <circle cx="51" cy="42.5" r="2" fill="#e8a848" opacity="0.6"/>
  <circle cx="13" cy="42.5" r="2" fill="#e85d3a" opacity="0.6"/>

  <!-- Connection lines -->
  <line x1="32" y1="12" x2="32" y2="26" stroke="rgba(200,64,46,0.25)" stroke-width="1"/>
  <line x1="49.3" y1="41.5" x2="38" y2="35" stroke="rgba(232,168,72,0.25)" stroke-width="1"/>
  <line x1="14.7" y1="41.5" x2="26" y2="35" stroke="rgba(232,93,58,0.25)" stroke-width="1"/>

  <!-- Terminal cursor -->
  <rect x="29.5" y="22" width="5" height="20" rx="2.5" fill="url(#grad)" filter="url(#glow)"/>

  <!-- Blink dot -->
  <circle cx="32" cy="32" r="1.5" fill="#f2ece6" opacity="0.9"/>
</svg>
