<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#0c1222"/>
    </linearGradient>
    <radialGradient id="glow-tl" cx="12%" cy="22%" r="50%">
      <stop offset="0%" stop-color="rgba(34,211,238,0.20)"/>
      <stop offset="60%" stop-color="rgba(34,211,238,0.03)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow-br" cx="88%" cy="78%" r="45%">
      <stop offset="0%" stop-color="rgba(129,140,248,0.14)"/>
      <stop offset="60%" stop-color="rgba(129,140,248,0.02)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="pill-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(34,211,238,0.10)"/>
      <stop offset="100%" stop-color="rgba(34,211,238,0.03)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-tl)"/>
  <rect width="1200" height="630" fill="url(#glow-br)"/>

  <!-- Subtle dots -->
  <g opacity="0.025" fill="#22d3ee">
    <circle cx="120" cy="90" r="1.2"/><circle cx="280" cy="140" r="0.8"/>
    <circle cx="460" cy="70" r="1"/><circle cx="620" cy="150" r="0.7"/>
    <circle cx="780" cy="80" r="1.1"/><circle cx="940" cy="130" r="0.9"/>
    <circle cx="1100" cy="60" r="1"/><circle cx="180" cy="520" r="0.9"/>
    <circle cx="400" cy="560" r="1.1"/><circle cx="640" cy="530" r="0.8"/>
    <circle cx="860" cy="570" r="1"/><circle cx="1060" cy="540" r="0.9"/>
  </g>

  <!-- Left vertical accent -->
  <rect x="90" y="140" width="2" height="240" fill="url(#line)" opacity="0.45" rx="1"/>

  <!-- Name -->
  <text x="120" y="210" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="68" font-weight="800" fill="#ffffff" letter-spacing="-0.03em">Aditya Rathod</text>

  <!-- Title -->
  <text x="120" y="252" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="20" fill="#64748b" letter-spacing="0.04em" font-weight="400">Systems Engineer · Backend · AI Tooling</text>

  <!-- Gradient bar -->
  <rect x="120" y="275" width="180" height="2" fill="url(#line)" rx="1"/>

  <!-- Tag pills row -->
  <g transform="translate(120, 305)">
    <rect width="110" height="32" rx="16" fill="url(#pill-fill)" stroke="rgba(34,211,238,0.18)" stroke-width="1"/>
    <text x="55" y="21" font-family="'Inter',system-ui,sans-serif" font-size="13" fill="#22d3ee" text-anchor="middle" font-weight="500">FastAPI</text>

    <g transform="translate(124, 0)">
      <rect width="68" height="32" rx="16" fill="url(#pill-fill)" stroke="rgba(34,211,238,0.18)" stroke-width="1"/>
      <text x="34" y="21" font-family="'Inter',system-ui,sans-serif" font-size="13" fill="#22d3ee" text-anchor="middle" font-weight="500">Rust</text>
    </g>

    <g transform="translate(206, 0)">
      <rect width="118" height="32" rx="16" fill="url(#pill-fill)" stroke="rgba(34,211,238,0.18)" stroke-width="1"/>
      <text x="59" y="21" font-family="'Inter',system-ui,sans-serif" font-size="13" fill="#22d3ee" text-anchor="middle" font-weight="500">PostgreSQL</text>
    </g>

    <g transform="translate(338, 0)">
      <rect width="92" height="32" rx="16" fill="url(#pill-fill)" stroke="rgba(34,211,238,0.18)" stroke-width="1"/>
      <text x="46" y="21" font-family="'Inter',system-ui,sans-serif" font-size="13" fill="#22d3ee" text-anchor="middle" font-weight="500">PyTorch</text>
    </g>

    <g transform="translate(444, 0)">
      <rect width="118" height="32" rx="16" fill="url(#pill-fill)" stroke="rgba(34,211,238,0.18)" stroke-width="1"/>
      <text x="59" y="21" font-family="'Inter',system-ui,sans-serif" font-size="13" fill="#22d3ee" text-anchor="middle" font-weight="500">Tree-sitter</text>
    </g>

    <g transform="translate(576, 0)">
      <rect width="68" height="32" rx="16" fill="url(#pill-fill)" stroke="rgba(34,211,238,0.18)" stroke-width="1"/>
      <text x="34" y="21" font-family="'Inter',system-ui,sans-serif" font-size="13" fill="#22d3ee" text-anchor="middle" font-weight="500">YOLO</text>
    </g>
  </g>

  <!-- IIT Jodhpur badge -->
  <g transform="translate(120, 360)">
    <rect width="145" height="30" rx="15" fill="rgba(129,140,248,0.08)" stroke="rgba(129,140,248,0.18)" stroke-width="1"/>
    <text x="72" y="20" font-family="'Inter',system-ui,sans-serif" font-size="12" fill="#a5b4fc" text-anchor="middle" font-weight="500" letter-spacing="0.04em">IIT JODHPUR</text>
  </g>

  <!-- Right side: 3 cards -->
  <g transform="translate(760, 120)">
    <!-- CORTEX card -->
    <rect x="0" y="0" width="370" height="110" rx="14" fill="rgba(10,15,30,0.7)" stroke="rgba(34,211,238,0.1)" stroke-width="1"/>
    <text x="22" y="28" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#22d3ee" letter-spacing="0.18em" font-weight="600">CORTEX</text>
    <text x="22" y="52" font-family="'Inter',system-ui,sans-serif" font-size="14" fill="#cbd5e1" font-weight="500">Local-first AI infrastructure platform</text>
    <text x="22" y="74" font-family="'Inter',system-ui,sans-serif" font-size="12" fill="#475569">FastAPI · PostgreSQL · Redis · Qdrant · 1,900+ tests</text>
    <text x="22" y="96" font-family="'Inter',system-ui,sans-serif" font-size="12" fill="#475569">Agent loops · hybrid retrieval · full-stack</text>

    <!-- ASTERA card -->
    <g transform="translate(0, 126)">
      <rect x="0" y="0" width="370" height="110" rx="14" fill="rgba(10,15,30,0.7)" stroke="rgba(129,140,248,0.1)" stroke-width="1"/>
      <text x="22" y="28" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#818cf8" letter-spacing="0.18em" font-weight="600">ASTERA</text>
      <text x="22" y="52" font-family="'Inter',system-ui,sans-serif" font-size="14" fill="#cbd5e1" font-weight="500">Production-grade static analysis engine</text>
      <text x="22" y="74" font-family="'Inter',system-ui,sans-serif" font-size="12" fill="#475569">Rust · Tree-sitter · 14 languages · Code Property Graph</text>
      <text x="22" y="96" font-family="'Inter',system-ui,sans-serif" font-size="12" fill="#475569">153 tests · 92 benchmarks · semantic search</text>
    </g>

    <!-- Research card -->
    <g transform="translate(0, 252)">
      <rect x="0" y="0" width="370" height="110" rx="14" fill="rgba(10,15,30,0.7)" stroke="rgba(34,211,238,0.08)" stroke-width="1"/>
      <text x="22" y="28" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#22d3ee" letter-spacing="0.18em" font-weight="600">RESEARCH</text>
      <text x="22" y="52" font-family="'Inter',system-ui,sans-serif" font-size="14" fill="#cbd5e1" font-weight="500">CNN-Attention for imbalanced classification</text>
      <text x="22" y="74" font-family="'Inter',system-ui,sans-serif" font-size="12" fill="#475569">Prof. Pratik Mazumder · IIT Jodhpur</text>
      <text x="22" y="96" font-family="'Inter',system-ui,sans-serif" font-size="12" fill="#475569">30+ model variants · PLDNet baseline · ablations</text>
    </g>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#line)" opacity="0.1"/>
</svg>
